# Push → SSH ile git pull + docker compose (tek repo: kök = backend)
name: Deploy backend

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            ROOT="${{ secrets.DEPLOY_REPO_ROOT }}"
            export DEPLOY_REPO_ROOT="$ROOT"
            bash "$ROOT/deploy/remote-deploy.sh"
