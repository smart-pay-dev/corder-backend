services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: corder
      POSTGRES_PASSWORD: corder_secret
      POSTGRES_DB: corder
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corder -d corder"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata_dev:
